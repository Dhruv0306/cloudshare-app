spring:
  datasource:
    url: jdbc:h2:mem:cloudshare;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: none

storage:
  provider: LOCAL
  local:
    directory: target/test-uploads
