server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:20}

spring:
  application:
    name: cloudshare
  config:
    import: optional:file:.env[.properties]
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cloudshare}
    username: ${SPRING_DATASOURCE_USERNAME:cloudshare_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: CloudShareHikariPool
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:50}
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 2000

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    open-in-view: false

  # Default Spring Redis (cache-aside) configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# Custom Redis configurations and security
security:
  redis:
    host: ${SECURITY_REDIS_HOST:localhost}
    port: ${SECURITY_REDIS_PORT:6380}
  jwt:
    secret: ${JWT_SECRET:}
    expiration-seconds: ${JWT_EXPIRATION:900}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800}
  rate-limiting:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-limit: ${RATE_LIMIT_AUTH:5}
    mfa-limit: ${RATE_LIMIT_MFA:5}
    upload-limit: ${RATE_LIMIT_UPLOAD:10}
    link-limit: ${RATE_LIMIT_LINK:30}
    general-limit: ${RATE_LIMIT_GENERAL:100}

# ClamAV Configuration
clamav:
  host: ${CLAMAV_HOST:localhost}
  port: ${CLAMAV_PORT:3310}
  timeout-ms: 10000

# File Storage Configuration
storage:
  provider: ${STORAGE_PROVIDER:LOCAL} # LOCAL or MINIO
  local:
    directory: ${STORAGE_LOCAL_DIRECTORY:./uploads}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket-name: ${MINIO_BUCKET_NAME:cloudshare-bucket}

# Cryptography
crypto:
  master-kek: ${CRYPTO_MASTER_KEK:}

# Scheduler Configurations
app:
  scheduler:
    file-purge:
      cron: "${SCHEDULER_FILE_PURGE_CRON:0 0 2 * * ?}" # 2:00 AM UTC daily
    link-cleanup:
      cron: "${SCHEDULER_LINK_CLEANUP_CRON:0 0 3 * * ?}" # 3:00 AM UTC daily


logging:
  level:
    org.springframework.security: INFO
    org.flywaydb: INFO
    com.cloudshare: DEBUG
    org.springframework.data.repository.config: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true # Exposes liveness and readiness endpoints separately
  metrics:
    tags:
      application: ${spring.application.name}
