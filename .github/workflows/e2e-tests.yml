name: Playwright E2E Tests

on:
    schedule:
        # Nightly at 02:00 UTC. Runs against a full Docker Compose stack
        # (Postgres, Redis x2, ClamAV, MinIO, Nginx, Spring Boot), so it's
        # deliberately not on every push - see Phase 12 plan.
        - cron: "0 2 * * *"
    workflow_dispatch: {}

jobs:
    e2e:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Create CI env file
              env:
                  CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
                  CI_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
                  CI_CRYPTO_MASTER_KEK: ${{ secrets.CI_CRYPTO_MASTER_KEK }}
              run: |
                  # Same pattern as api-tests.yml: use repo secrets if configured,
                  # otherwise generate secure one-off keys for this run only.
                  # Nothing here is ever written to git - generated fresh per run
                  # and deleted in the "Cleanup env file" step below regardless of
                  # outcome.
                  DB_PASSWORD="$CI_DB_PASSWORD"
                  [ -z "$DB_PASSWORD" ] && DB_PASSWORD="A1000Rocks"

                  JWT_SECRET="$CI_JWT_SECRET"
                  [ -z "$JWT_SECRET" ] && JWT_SECRET=$(openssl rand -hex 64)

                  CRYPTO_KEK="$CI_CRYPTO_MASTER_KEK"
                  [ -z "$CRYPTO_KEK" ] && CRYPTO_KEK=$(openssl rand -hex 64)

                  echo "SPRING_DATASOURCE_USERNAME=cloudshare_user" > tests/.env.ci
                  echo "SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD" >> tests/.env.ci
                  echo "JWT_SECRET=$JWT_SECRET" >> tests/.env.ci
                  echo "JWT_EXPIRATION=900" >> tests/.env.ci
                  echo "JWT_REFRESH_EXPIRATION=604800" >> tests/.env.ci
                  echo "MINIO_ROOT_USER=cloudshare_ci_minio" >> tests/.env.ci
                  echo "MINIO_ROOT_PASSWORD=A1000Minio" >> tests/.env.ci
                  echo "CRYPTO_MASTER_KEK=$CRYPTO_KEK" >> tests/.env.ci
                  # Rate limits opened up: the E2E suite logs in/enrolls MFA/refreshes
                  # tokens repeatedly against the same handful of test users.
                  echo "RATE_LIMIT_AUTH=10000" >> tests/.env.ci
                  echo "RATE_LIMIT_MFA=10000" >> tests/.env.ci
                  echo "RATE_LIMIT_UPLOAD=10000" >> tests/.env.ci
                  echo "RATE_LIMIT_LINK=10000" >> tests/.env.ci
                  echo "RATE_LIMIT_LINK_GLOBAL=10000" >> tests/.env.ci
                  echo "RATE_LIMIT_GENERAL=10000" >> tests/.env.ci
                  echo "PASSWORD_BREACH_CHECK_ENABLED=false" >> tests/.env.ci
                  echo "CRYPTO_KEK_ALLOW_RAW_PASSPHRASE=true" >> tests/.env.ci

            - name: Generate self-signed Nginx certs
              run: bash nginx/ssl/generate-certs.sh

            - name: Start stack
              run: docker compose --env-file tests/.env.ci up -d --build

            - name: Wait for Spring Boot
              run: |
                  for i in {1..90}; do
                    curl -skf https://localhost/actuator/health && break
                    echo "Waiting for app... ($i)"
                    sleep 5
                    [ $i -eq 90 ] && echo "Spring Boot did not start in time" && exit 1
                  done

            - name: Wait for Nginx gateway (HTTPS)
              run: |
                  for i in {1..60}; do
                    curl -skf https://localhost/actuator/health && break
                    echo "Waiting for gateway... ($i)"
                    sleep 5
                    [ $i -eq 60 ] && echo "Gateway did not become ready in time" && exit 1
                  done

            - name: Wait for ClamAV
              run: |
                  for i in {1..60}; do
                    docker compose --env-file tests/.env.ci exec -T app nc -z clamav 3310 && echo "ClamAV ready" && break
                    echo "Waiting for ClamAV... ($i)"
                    sleep 5
                    [ $i -eq 60 ] && echo "ClamAV did not become ready in time" && exit 1
                  done

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: tests/e2e/package-lock.json

            - name: Install E2E dependencies
              working-directory: tests/e2e
              run: npm install

            - name: Install Playwright browsers
              working-directory: tests/e2e
              run: npx playwright install --with-deps chromium

            - name: Run Playwright E2E suite
              working-directory: tests/e2e
              env:
                  E2E_BASE_URL: https://localhost
                  SPRING_DATASOURCE_USERNAME: cloudshare_user
              run: npx playwright test

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: tests/e2e/playwright-report/
                  retention-days: 14

            - name: Dump stack logs on failure
              if: failure()
              run: docker compose --env-file tests/.env.ci logs

            - name: Cleanup env file
              if: always()
              run: rm -f tests/.env.ci
