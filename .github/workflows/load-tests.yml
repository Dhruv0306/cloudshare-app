name: Gatling Load Tests

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Base URL for load tests'
        required: true
        default: 'https://localhost'

jobs:
  load-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI env file
        env:
          CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          CI_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
          CI_CRYPTO_MASTER_KEK: ${{ secrets.CI_CRYPTO_MASTER_KEK }}
        run: |
          # Use secrets if available, otherwise generate secure 64-byte keys dynamically
          DB_PASSWORD="$CI_DB_PASSWORD"
          [ -z "$DB_PASSWORD" ] && DB_PASSWORD="A1000Rocks"
          
          JWT_SECRET="$CI_JWT_SECRET"
          [ -z "$JWT_SECRET" ] && JWT_SECRET=$(openssl rand -hex 64)
          
          CRYPTO_KEK="$CI_CRYPTO_MASTER_KEK"
          [ -z "$CRYPTO_KEK" ] && CRYPTO_KEK=$(openssl rand -hex 64)
          
          echo "SPRING_DATASOURCE_USERNAME=cloudshare_user" > tests/.env.ci
          echo "SPRING_DATASOURCE_PASSWORD=$DB_PASSWORD" >> tests/.env.ci
          echo "JWT_SECRET=$JWT_SECRET" >> tests/.env.ci
          echo "JWT_EXPIRATION=900" >> tests/.env.ci
          echo "JWT_REFRESH_EXPIRATION=604800" >> tests/.env.ci
          echo "MINIO_ROOT_USER=minioadmin" >> tests/.env.ci
          echo "MINIO_ROOT_PASSWORD=A1000Minio" >> tests/.env.ci
          echo "CRYPTO_MASTER_KEK=$CRYPTO_KEK" >> tests/.env.ci
          echo "RATE_LIMIT_ENABLED=false" >> tests/.env.ci

      - name: Generate SSL certificates
        run: |
          chmod +x nginx/ssl/generate-certs.sh
          ./nginx/ssl/generate-certs.sh

      - name: Start stack
        run: docker compose --env-file tests/.env.ci up -d --build

      - name: Wait for Spring Boot backend
        run: |
          for i in {1..90}; do
            curl -sf http://localhost:8080/actuator/health && break
            echo "Waiting for backend app... ($i)"
            sleep 5
            [ $i -eq 90 ] && echo "Spring Boot backend did not start in time" && exit 1
          done

      - name: Wait for Nginx Gateway
        run: |
          for i in {1..90}; do
            curl -k -sf https://localhost/actuator/health && break
            echo "Waiting for Nginx Gateway... ($i)"
            sleep 5
            [ $i -eq 90 ] && echo "Nginx Gateway did not start in time" && exit 1
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Gatling Load Tests
        run: mvn clean verify -Pperformance -Dgatling.baseUrl=${{ github.event.inputs.target_url }}

      - name: Archive Gatling Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gatling-reports
          path: target/gatling/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: docker compose --env-file tests/.env.ci logs

      - name: Cleanup env file
        if: always()
        run: |
          docker compose --env-file tests/.env.ci down -v
          rm -f tests/.env.ci
