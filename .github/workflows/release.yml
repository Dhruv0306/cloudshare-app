name: Automated GitHub Release

on:
  push:
    tags:
      # Matches semantic version tags like v1.0.0, v1.1.2, v2.0.0-rc.1
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history to verify branch lineage

      - name: Verify tag commit is on main branch
        run: |
          echo "Verifying tag ${{ github.ref_name }} commit (${{ github.sha }}) belongs to main branch..."
          git fetch origin main
          if git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "Success: Tag commit is present on the main branch."
          else
            echo "::error::Tag commit ${{ github.sha }} is not on the 'main' branch. Aborting release creation."
            exit 1
          fi

      - name: Check if GitHub Release already exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists. Skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Release Notes from CHANGELOG.md
        id: extract_changelog
        if: steps.check_release.outputs.exists != 'true'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 -c '
          import os, re, sys

          tag = os.environ.get("TAG_NAME", "")
          version_num = tag.lstrip("v")
          changelog_file = "CHANGELOG.md"

          if not os.path.exists(changelog_file):
              print(f"::warning::File {changelog_file} not found.")
              notes = f"Release {tag}"
          else:
              with open(changelog_file, "r", encoding="utf-8") as f:
                  content = f.read()

              escaped_tag = re.escape(tag)
              escaped_ver = re.escape(version_num)
              
              # Match headings such as:
              # ## [v1.0.0], ## [1.0.0], ## v1.0.0, ## 1.0.0
              pattern = rf"^##\s+\[?(?:{escaped_tag}|{escaped_ver})\]?(?:[\s\-].*)?$"
              
              lines = content.splitlines()
              in_section = False
              notes_lines = []

              for line in lines:
                  if re.match(pattern, line, re.IGNORECASE):
                      in_section = True
                      continue
                  elif in_section:
                      if line.startswith("# ") or line.startswith("## "):
                          break
                      notes_lines.append(line)

              notes = "\n".join(notes_lines).strip()
              if not notes:
                  print(f"::warning::No release notes section found for {tag} in {changelog_file}")
                  notes = f"Release {tag}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write("release_notes<<EOF\n")
              out.write(notes + "\n")
              out.write("EOF\n")
          '

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXTRA_FLAGS=""
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            EXTRA_FLAGS="--prerelease"
          fi

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.extract_changelog.outputs.release_notes }}" \
            $EXTRA_FLAGS
